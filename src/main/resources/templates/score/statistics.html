<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩统计</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>成绩管理系统 - 成绩统计</h1>
            <div class="user-info">
                <a href="/main">返回主页</a>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2 th:text="${exam.examName} + ' - 成绩统计'">成绩统计</h2>
            </div>

            <div class="statistics-container">
                <div class="stats-cards">
                    <div class="stat-card">
                        <h3>平均分</h3>
                        <div class="stat-value" th:text="${averageScore}">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>最高分</h3>
                        <div class="stat-value" th:text="${highestScore}">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>最低分</h3>
                        <div class="stat-value" th:text="${lowestScore}">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>参考人数</h3>
                        <div class="stat-value" th:text="${#lists.size(scores)}">0</div>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <h3>详细成绩</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>成绩ID</th>
                            <th>学生ID</th>
                            <th>成绩</th>
                            <th>录入人</th>
                            <th>录入时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="score : ${scores}">
                            <td th:text="${score.scoreId}"></td>
                            <td th:text="${score.studentId}"></td>
                            <td th:text="${score.score}"></td>
                            <td th:text="${score.recordedBy}"></td>
                            <td th:text="${#dates.format(score.recordTime, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
