<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科目管理</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>成绩管理系统 - 科目管理</h1>
            <div class="user-info">
                <a href="/main">返回主页</a>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>科目管理</h2>
                <a href="/subject/add" class="btn btn-primary">添加科目</a>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>科目ID</th>
                            <th>科目名称</th>
                            <th>学分</th>
                            <th>任课教师</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="subject : ${subjects}">
                            <td th:text="${subject.subjectId}"></td>
                            <td th:text="${subject.subjectName}"></td>
                            <td th:text="${subject.credit}"></td>
                            <td th:text="${teacherMap[subject.teacherId]}"></td>
                            <td>
                                <a th:href="@{/subject/edit/{subjectId}(subjectId=${subject.subjectId})}" 
                                   class="btn btn-sm btn-warning">编辑</a>
                                <a th:href="@{/subject/delete/{subjectId}(subjectId=${subject.subjectId})}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('确定要删除这个科目吗？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
