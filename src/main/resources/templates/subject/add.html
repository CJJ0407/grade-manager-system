<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加科目</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>成绩管理系统 - 添加科目</h1>
            <div class="user-info">
                <a href="/subject/manage">返回科目管理</a>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>添加科目</h2>
            </div>

            <div class="form-container">
                <form action="/subject/add" method="post" class="form">
                    <div class="form-group">
                        <label for="subjectId">科目ID:</label>
                        <input type="text" id="subjectId" name="subjectId" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="subjectName">科目名称:</label>
                        <input type="text" id="subjectName" name="subjectName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="credit">学分:</label>
                        <input type="number" id="credit" name="credit" step="0.1" min="0" max="10" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="teacherId">任课教师:</label>
                        <select id="teacherId" name="teacherId" required>
                            <option value="">请选择教师</option>
                            <option th:each="teacher : ${teachers}" 
                                    th:value="${teacher.userId}" 
                                    th:text="${teacher.name} + ' (' + ${teacher.userId} + ')'"
                                    th:selected="${currentUser.role == 'teacher' && teacher.userId == currentUser.userId}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">添加科目</button>
                        <a href="/subject/manage" class="btn btn-secondary">取消</a>
                    </div>
                    
                    <div th:if="${error}" class="error-message" th:text="${error}"></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
