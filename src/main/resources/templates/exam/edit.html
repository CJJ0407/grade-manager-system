<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑考试</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>成绩管理系统 - 编辑考试</h1>
            <div class="user-info">
                <a href="/exam/manage">返回考试管理</a>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>编辑考试</h2>
            </div>

            <div class="form-container">
                <form action="/exam/update" method="post" class="form">
                    <div class="form-group">
                        <label for="examId">考试ID:</label>
                        <input type="text" id="examId" name="examId" th:value="${exam.examId}" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label for="examName">考试名称:</label>
                        <input type="text" id="examName" name="examName" th:value="${exam.examName}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="examDate">考试日期:</label>
                        <input type="date" id="examDate" name="examDate" 
                               th:value="${#dates.format(exam.examDate, 'yyyy-MM-dd')}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="semester">学期:</label>
                        <input type="text" id="semester" name="semester" th:value="${exam.semester}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="subjectId">科目:</label>
                        <select id="subjectId" name="subjectId" required>
                            <option th:each="subject : ${subjects}" 
                                    th:value="${subject.subjectId}" 
                                    th:selected="${subject.subjectId == exam.subjectId}"
                                    th:text="${subject.subjectName} + ' (' + ${subject.subjectId} + ')'">
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">更新考试</button>
                        <a href="/exam/manage" class="btn btn-secondary">取消</a>
                    </div>
                    
                    <div th:if="${error}" class="error-message" th:text="${error}"></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
