<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑用户</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>成绩管理系统 - 编辑用户</h1>
            <div class="user-info">
                <a href="/user/manage">返回用户管理</a>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>编辑用户</h2>
            </div>

            <div class="form-container">
                <form action="/user/update" method="post" class="form">
                    <div class="form-group">
                        <label for="userId">用户ID:</label>
                        <input type="text" id="userId" name="userId" th:value="${user.userId}" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label for="username">用户名:</label>
                        <input type="text" id="username" name="username" th:value="${user.username}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码:</label>
                        <input type="password" id="password" name="password" th:value="${user.password}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="role">角色:</label>
                        <select id="role" name="role" required>
                            <option value="admin" th:selected="${user.role == 'admin'}">管理员</option>
                            <option value="teacher" th:selected="${user.role == 'teacher'}">教师</option>
                            <option value="student" th:selected="${user.role == 'student'}">学生</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="name">姓名:</label>
                        <input type="text" id="name" name="name" th:value="${user.name}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">性别:</label>
                        <select id="gender" name="gender" required>
                            <option value="男" th:selected="${user.gender == '男'}">男</option>
                            <option value="女" th:selected="${user.gender == '女'}">女</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">电话:</label>
                        <input type="text" id="phone" name="phone" th:value="${user.phone}">
                    </div>

                    <div class="form-group">
                        <label for="email">邮箱:</label>
                        <input type="email" id="email" name="email" th:value="${user.email}">
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">更新用户</button>
                        <a href="/user/manage" class="btn btn-secondary">取消</a>
                    </div>
                    
                    <div th:if="${error}" class="error-message" th:text="${error}"></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
