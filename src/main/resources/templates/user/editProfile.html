<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑个人信息 - 成绩管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="content-card">
            <div class="card-header">
                <h2>编辑个人信息</h2>
            </div>

            <form th:action="@{/user/updateProfile}" method="post" class="form-container">
                <div class="form-group">
                    <label for="name">姓名:</label>
                    <input type="text" id="name" name="name" th:value="${user.name}" required>
                </div>
                
                <div class="form-group">
                    <label for="gender">性别:</label>
                    <select id="gender" name="gender" required>
                        <option value="男" th:selected="${user.gender == '男'}">男</option>
                        <option value="女" th:selected="${user.gender == '女'}">女</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="phone">电话:</label>
                    <input type="text" id="phone" name="phone" th:value="${user.phone}">
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱:</label>
                    <input type="email" id="email" name="email" th:value="${user.email}">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="/user/profile" class="btn btn-secondary">取消</a>
                </div>
                
                <div th:if="${error}" class="error-message" th:text="${error}"></div>
            </form>
        </div>
    </div>
</body>
</html>
