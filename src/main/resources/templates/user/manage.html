<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>成绩管理系统 - 用户管理</h1>
            <div class="user-info">
                <a href="/main">返回主页</a>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>用户管理</h2>
                <a href="/user/add" class="btn btn-primary">添加用户</a>
            </div>

            <div th:if="${success}" class="success-message" th:text="${success}"></div>
            <div th:if="${error}" class="error-message" th:text="${error}"></div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>用户ID</th>
                            <th>用户名</th>
                            <th>姓名</th>
                            <th>角色</th>
                            <th>性别</th>
                            <th>电话</th>
                            <th>邮箱</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.userId}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.name}"></td>
                            <td>
                                <span th:if="${user.role == 'admin'}" class="role-badge admin">管理员</span>
                                <span th:if="${user.role == 'teacher'}" class="role-badge teacher">教师</span>
                                <span th:if="${user.role == 'student'}" class="role-badge student">学生</span>
                            </td>
                            <td th:text="${user.gender}"></td>
                            <td th:text="${user.phone}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <a th:href="@{/user/edit/{userId}(userId=${user.userId})}" class="btn btn-sm btn-warning">编辑</a>
                                <a th:href="@{/user/delete/{userId}(userId=${user.userId})}" 
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('确定要删除这个用户吗？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
